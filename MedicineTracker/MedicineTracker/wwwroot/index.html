<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>
        Medicine Tracker
    </title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <h2>
        Medicine Tracker
    </h2>
    <input id="searchBox" placeholder="Search medicine">
    <table id="medicineTable">
        <thead>
            <tr>
                <th>
                    Name
                </th>
                <th>
                    Expiry Date
                </th>
                <th>
                    Quantity
                </th>
                <th>
                    Price
                </th>
                <th>
                    Brand
                </th>
            </tr>
        </thead>
        <tbody>
        </tbody>
    </table>
    <h3>
        Add Medicine
    </h3>
    <input id="name" placeholder="Name">
    <input id="notes" placeholder="Notes">
    <input id="expiry" type="date">
    <input id="qty" type="number">
    <input id="price" type="number" step="0.01">
    <input id="brand" placeholder="Brand">
    <button onclick="addMedicine()">
        Add Medicine
    </button>
    <hr>
    <h3>
        Record Sale
    </h3>
    <select id="saleMedicine">
    </select>
    <input id="saleQuantity" type="number" placeholder="Quantity Sold">
    <button onclick="recordSale()">
        Record Sale
    </button>
    <hr>
    <h3>
        Sales History
    </h3>
    <table id="salesTable">
        <thead>
            <tr>
                <th>
                    Sale Id
                </th>
                <th>
                    Medicine Id
                </th>
                <th>
                    Quantity Sold
                </th>
                <th>
                    Sold Date
                </th>
            </tr>
        </thead>
        <tbody>
        </tbody>
    </table>
    <script src="app.js">
    </script>
</body>

</html>
